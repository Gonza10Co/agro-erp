# Template de nginx para servir el SPA de Angular en Railway.
# La imagen nginx hace envsubst de los *.template al arrancar: ${PORT} se reemplaza
# por el puerto que inyecta Railway; $uri se preserva (no es variable de entorno).
server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Routing del SPA: cualquier ruta cae en index.html (Angular maneja el router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets con hash; index.html siempre fresco.
    location ~* \.(js|css|woff2?|png|jpe?g|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
